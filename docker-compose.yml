version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: arbet-postgres
    environment:
      POSTGRES_USER: arbet
      POSTGRES_PASSWORD: arbet_dev_password
      POSTGRES_DB: arbet_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbet -d arbet_local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arbet-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: arbet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arbet-network

  # Backend API (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: arbet-backend
    environment:
      DATABASE_URL: postgresql://arbet:arbet_dev_password@postgres:5432/arbet_local
      REDIS_URL: redis://redis:6379
      SOLANA_RPC_URL: https://api.devnet.solana.com
      ALCHEMY_API_KEY: ${ALCHEMY_API_KEY:-}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
      DEBUG: "true"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arbet-network
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: arbet-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arbet-network

  # Adminer (Database UI)
  adminer:
    image: adminer:latest
    container_name: arbet-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - arbet-network

  # MailHog (Email Testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: arbet-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - arbet-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: arbet-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - arbet-network
    profiles:
      - proxy

networks:
  arbet-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
