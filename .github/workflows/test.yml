name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: arbet
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: arbet_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov

    - name: Run backend tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://arbet:test_password@localhost:5432/arbet_test
        REDIS_URL: redis://localhost:6379
      run: |
        python -m pytest tests/ -v --cov=backend --cov-report=xml

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./backend/coverage.xml
        flags: unittests
        name: codecov-backend

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'web/package-lock.json'

    - name: Install dependencies
      working-directory: ./web
      run: npm ci

    - name: Run linter
      working-directory: ./web
      run: npm run lint || true

    - name: Run tests
      working-directory: ./web
      run: npm run test -- --coverage

    - name: Build
      working-directory: ./web
      run: npm run build

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./web/coverage/coverage-final.json
        flags: frontend
        name: codecov-frontend

  smart-contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: contracts

    - name: Install Anchor
      run: |
        cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
        avm install latest
        avm use latest

    - name: Build contracts
      working-directory: ./contracts
      run: anchor build

    - name: Run contract tests
      working-directory: ./contracts
      run: anchor test || true

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, smart-contracts]
    if: always()

    steps:
    - uses: actions/checkout@v4

    - name: Check test results
      run: |
        echo "Backend Tests: ${{ needs.backend-tests.result }}"
        echo "Frontend Tests: ${{ needs.frontend-tests.result }}"
        echo "Smart Contracts: ${{ needs.smart-contracts.result }}"

        if [ "${{ needs.backend-tests.result }}" != "success" ] || \
           [ "${{ needs.frontend-tests.result }}" != "success" ] || \
           [ "${{ needs.smart-contracts.result }}" != "success" ]; then
          echo "Quality gate failed"
          exit 1
        fi
        echo "All quality checks passed!"
