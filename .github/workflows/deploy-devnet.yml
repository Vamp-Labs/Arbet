name: Deploy to Devnet

on:
  push:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'devnet'
        type: choice
        options:
          - devnet
          - testnet

env:
  REGISTRY: docker.io

jobs:
  test:
    name: Run Tests First
    runs-on: ubuntu-latest
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: test
    if: success()

    environment:
      name: devnet
      url: https://arbet-devnet.example.com

    steps:
    - uses: actions/checkout@v4

    - name: Set up Solana CLI
      run: |
        sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
        solana --version

    - name: Set up Anchor
      run: |
        cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
        avm install latest
        avm use latest

    - name: Configure Solana
      env:
        SOLANA_KEYPAIR: ${{ secrets.SOLANA_DEVNET_KEYPAIR }}
      run: |
        mkdir -p ~/.config/solana
        echo "$SOLANA_KEYPAIR" > ~/.config/solana/id.json
        chmod 600 ~/.config/solana/id.json
        solana config set --url devnet
        solana address

    - name: Build Smart Contracts
      working-directory: ./contracts
      run: anchor build

    - name: Deploy Smart Contracts
      id: deploy
      working-directory: ./contracts
      run: |
        PROGRAM_ID=$(anchor deploy --provider.cluster devnet 2>&1 | grep "Program Id:" | awk '{print $3}')
        echo "program_id=$PROGRAM_ID" >> $GITHUB_OUTPUT
        echo "Deployed to: $PROGRAM_ID"

    - name: Update Deployment Config
      env:
        PROGRAM_ID: ${{ steps.deploy.outputs.program_id }}
      run: |
        sed -i "s/PROGRAM_ID=.*/PROGRAM_ID=$PROGRAM_ID/" .env.devnet

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    - name: Build and Push Docker Images
      run: |
        docker-compose build
        docker tag arbet-backend:latest ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/arbet-backend:devnet
        docker tag arbet-frontend:latest ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/arbet-frontend:devnet
        docker push ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/arbet-backend:devnet
        docker push ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/arbet-frontend:devnet

    - name: Deploy Services
      env:
        PROGRAM_ID: ${{ steps.deploy.outputs.program_id }}
        ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
      run: |
        docker-compose -f docker-compose.yml up -d

    - name: Wait for Services
      run: sleep 30

    - name: Run Health Checks
      run: bash scripts/health-check.sh

    - name: Verify Deployment
      run: |
        echo "Backend Health: $(curl -s http://localhost:8000/health || echo 'failed')"
        echo "Frontend Status: $(curl -s http://localhost:3000/ > /dev/null && echo 'OK' || echo 'failed')"

    - name: Notify Deployment
      if: always()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "Devnet Deployment Status",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Devnet Deployment*\nStatus: ${{ job.status }}\nProgram ID: ${{ steps.deploy.outputs.program_id }}\nBy: ${{ github.actor }}"
                }
              }
            ]
          }

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
    - uses: actions/checkout@v4

    - name: Rollback Deployment
      run: |
        docker-compose down
        echo "Rolled back to previous version"

    - name: Notify Rollback
      uses: slackapi/slack-github-action@v1.24.0
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "⚠️ Devnet Deployment Failed - Rolled Back",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Deployment Rollback*\nThe deployment failed and was rolled back\nCheck logs for details"
                }
              }
            ]
          }
